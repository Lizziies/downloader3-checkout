<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader&lt;3 — Premium</title>

<!-- 🎨 Gespeicherte Akzentfarbe SOFORT anwenden (vor dem ersten Malen). -->
<script>
(function () {
  try {
    var raw = localStorage.getItem("dl3_landing_accent");
    if (raw) {
      var c = JSON.parse(raw);
      var root = document.documentElement.style;
      root.setProperty("--pink", c.base);
      root.setProperty("--pink-dark", c.dark);
      root.setProperty("--pink-glow", c.glow);
      root.setProperty("--pink-glow2", c.glow2);
    }
  } catch (e) {}
})();
</script>

<style>
  :root {
    --pink: #EC4899;
    --pink-dark: #B9226E;
    --pink-glow: rgba(236, 72, 153, .35);
    --pink-glow2: rgba(236, 72, 153, .14);
    --bg: #0E0F14;
    --card: #1B1D26;
    --card2: #20222E;
    --border: #2A2D3A;
    --muted: #9CA3AF;
    --ease: cubic-bezier(.16, 1, .3, 1);
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Arial, sans-serif;
    background: var(--bg); color: #F3F4F6; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    -webkit-font-smoothing: antialiased;
    position: relative; overflow-x: hidden;
  }
  /* Dezente, animierte Hintergrund-Glows — passend zum Landingpage-Stil */
  body::before, body::after {
    content: ""; position: fixed; border-radius: 50%; filter: blur(70px);
    pointer-events: none; z-index: 0; opacity: .5;
  }
  body::before { width: 480px; height: 480px; top: -160px; left: -120px; background: radial-gradient(circle, var(--pink-glow), transparent 70%); animation: float1 18s ease-in-out infinite; }
  body::after { width: 420px; height: 420px; bottom: -180px; right: -100px; background: radial-gradient(circle, var(--pink-glow2), transparent 70%); animation: float2 22s ease-in-out infinite; }
  @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,30px); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px,-20px); } }

  .wrap { max-width: 880px; width: 100%; position: relative; z-index: 1; }

  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .8s var(--ease), transform .8s var(--ease); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .reveal, .reveal.in { opacity: 1; transform: none; transition: none; } }

  .lang-switch { text-align: center; margin-bottom: 10px; }
  .lang-switch button {
    background: transparent; border: 1px solid var(--muted); color: var(--muted);
    border-radius: 999px; padding: 5px 14px; font-size: 12px; cursor: pointer; margin: 0 4px;
    transition: all .2s var(--ease);
  }
  .lang-switch button:hover { border-color: var(--pink); color: var(--pink); }
  .lang-switch button.active { border-color: var(--pink); color: var(--pink); background: var(--pink-glow2); }
  .logo {
    text-align: center; font-size: 30px; font-weight: 800; color: var(--pink); margin-bottom: 6px;
    letter-spacing: -.01em;
  }
  .sub { text-align: center; color: var(--muted); margin-bottom: 36px; }
  .email-box { max-width: 420px; margin: 0 auto 32px; text-align: center; }
  .email-label { display: block; font-size: 13px; color: #D1D5DB; margin-bottom: 6px; font-weight: 600; }
  .email-input {
    width: 100%; height: 46px; border-radius: 12px; border: 2px solid var(--card);
    background: var(--card); color: #F3F4F6; padding: 0 14px; font-size: 14px;
    box-sizing: border-box; text-align: center; transition: border-color .25s var(--ease), box-shadow .25s var(--ease);
  }
  .email-input:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 4px var(--pink-glow2); }
  .email-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .plans { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }

  /* ---------- Plan-Karten: anklickbar, pinker Rahmen um das aktive Angebot ---------- */
  .plan {
    background: var(--card); border-radius: 18px; padding: 28px 22px;
    border: 2px solid var(--border); text-align: center; cursor: pointer;
    position: relative; overflow: hidden;
    transition: border-color .3s var(--ease), transform .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);
  }
  .plan:hover {
    transform: translateY(-5px);
    border-color: var(--pink-glow);
    box-shadow: 0 18px 40px rgba(0,0,0,.35);
  }
  /* Aktiv/ausgewählt: pinker Rahmen "wandert" um die angeklickte Karte */
  .plan.selected {
    border-color: var(--pink);
    background: linear-gradient(180deg, var(--pink-glow2), var(--card) 55%);
    box-shadow: 0 0 0 3px var(--pink-glow), 0 22px 48px rgba(0,0,0,.4);
    transform: translateY(-6px) scale(1.015);
  }
  .plan.popular:not(.selected) { border-color: var(--pink-glow); }
  .badge {
    display: inline-block; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff; font-size: 11px;
    font-weight: 700; padding: 4px 11px; border-radius: 999px; margin-bottom: 10px;
    box-shadow: 0 4px 14px var(--pink-glow);
  }
  .plan h3 { margin: 4px 0 4px; font-size: 18px; }
  .price { font-size: 34px; font-weight: 800; color: var(--pink); margin: 10px 0; transition: transform .3s var(--ease-spring); }
  .plan.selected .price { transform: scale(1.06); }
  .price span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .perks { list-style: none; padding: 0; margin: 16px 0 22px; text-align: left; color: #D1D5DB; font-size: 14px; }
  .perks li { padding: 4px 0; }
  .perks li::before { content: "✓ "; color: var(--pink); font-weight: 700; }
  .paypal-slot {
    transition: opacity .3s var(--ease), max-height .3s var(--ease);
  }

  .result {
    display: none; margin-top: 30px; background: var(--card); border-radius: 18px;
    padding: 30px; text-align: center; border: 1px solid var(--pink-glow);
    box-shadow: 0 0 0 1px var(--pink-glow2);
  }
  .result.show { display: block; }
  .code-box {
    font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--pink);
    background: #0E0F14; border: 2px dashed var(--pink); border-radius: 12px;
    padding: 14px; margin: 16px 0; user-select: all; cursor: pointer;
    transition: transform .2s var(--ease-spring);
  }
  .code-box:hover { transform: scale(1.02); }
  .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 36px; }
  .error { color: #F87171; text-align: center; margin-top: 16px; display: none; }
  .error.show { display: block; }
  .warning-box {
    max-width: 560px; margin: 0 auto 28px; background: rgba(251, 191, 36, .08);
    border: 1px solid rgba(251, 191, 36, .4); border-radius: 14px;
    padding: 14px 18px; font-size: 13px; color: #FCD34D; text-align: center; line-height: 1.5;
  }
  .warning-box b { color: #FDE68A; }

  /* ---------- 🎨 Custom-Farbwähler ---------- */
  .color-fab {
    position: fixed; bottom: 22px; right: 22px; z-index: 90;
    width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff; font-size: 20px;
    box-shadow: 0 10px 26px var(--pink-glow), 0 0 0 1px rgba(255,255,255,.08) inset;
    transition: transform .35s var(--ease-spring);
    display: flex; align-items: center; justify-content: center;
  }
  .color-fab:hover { transform: scale(1.1) rotate(12deg); }
  .color-panel {
    position: fixed; bottom: 84px; right: 22px; z-index: 90;
    background: var(--card2); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; width: 220px; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    opacity: 0; transform: translateY(12px) scale(.96); pointer-events: none;
    transition: opacity .25s var(--ease), transform .25s var(--ease);
  }
  .color-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .color-panel-title { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    transition: transform .2s var(--ease-spring), border-color .2s var(--ease);
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }
  .color-custom-row { display: flex; align-items: center; gap: 8px; }
  .color-custom-row input[type="color"] {
    width: 34px; height: 34px; border: none; border-radius: 50%; padding: 0;
    background: none; cursor: pointer; overflow: hidden;
    -webkit-appearance: none; appearance: none;
  }
  /* Innere Farbfläche des Farbwählers ebenfalls rund (Chrome/Edge) */
  .color-custom-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-custom-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
  .color-custom-row input[type="color"]::-moz-color-swatch { border: none; border-radius: 50%; }
  .color-reset {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 999px;
    padding: 6px 10px; font-size: 12px; cursor: pointer; transition: all .2s var(--ease);
  }
  .color-reset:hover { border-color: var(--pink); color: var(--pink); }

  /* ---------- 💥 Herzchen-Burst bei jedem Klick (in der gewählten Akzentfarbe) ---------- */
  .burst-heart {
    position: fixed; z-index: 200; pointer-events: none; line-height: 0;
    animation: burstFly .8s cubic-bezier(.16,1,.3,1) forwards;
    filter: drop-shadow(0 0 6px var(--pink-glow));
  }
  .burst-heart svg { display: block; }
  @keyframes burstFly {
    0% { transform: translate(0,0) scale(.5) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--bx), var(--by)) scale(1.2) rotate(var(--br)); opacity: 0; }
  }

  /* ---------- 🔦 Weicher Leucht-Cursor (folgt der Maus, nur Desktop) ---------- */
  .cursor-glow {
    position: fixed; top: 0; left: 0; width: 380px; height: 380px;
    border-radius: 50%; pointer-events: none; z-index: 2;
    background: radial-gradient(circle, var(--pink-glow2), transparent 62%);
    transform: translate(-50%, -50%); opacity: 0;
    transition: opacity .5s var(--ease);
    mix-blend-mode: screen;
  }
  body:hover .cursor-glow { opacity: .8; }
  @media (hover: none), (prefers-reduced-motion: reduce) { .cursor-glow { display: none; } }

  /* ---------- 🫀 Schlagendes Logo-Herz ---------- */
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    10% { transform: scale(1.18); }
    20% { transform: scale(1); }
    30% { transform: scale(1.12); }
    40% { transform: scale(1); }
  }
  .logo .beat { display: inline-block; animation: heartbeat 2.4s ease-in-out infinite; }

  /* ---------- 3D-Tilt auf den Angebots-Karten ---------- */
  .plans { perspective: 1100px; }
  .plan { transform-style: preserve-3d; }
</style>
</head>
<body>
<div class="cursor-glow" id="cursor-glow"></div>
<div class="wrap">
  <div class="lang-switch reveal">
    <button id="btn-de" onclick="setLang('de')">Deutsch</button>
    <button id="btn-en" onclick="setLang('en')">English</button>
  </div>
  <div class="logo reveal"><span class="beat">💜</span> Downloader&lt;3</div>
  <div class="sub reveal" data-i18n="sub"></div>

  <div class="warning-box reveal" data-i18n="prepay_warning"></div>

  <div class="email-box reveal">
    <label class="email-label" data-i18n="email_label"></label>
    <input type="email" id="buyer-email" class="email-input"
           data-i18n-ph="email_ph" />
    <p class="email-hint" data-i18n="email_hint"></p>
  </div>

  <p class="hint-select reveal" style="text-align:center; color:var(--muted); font-size:12px; margin: -14px 0 18px;" data-i18n="select_hint"></p>

  <div class="plans reveal" id="plans"></div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <h3 data-i18n="success_title"></h3>
    <p data-i18n="success_desc"></p>
    <div class="code-box" id="code-box"></div>
    <p style="color:var(--muted); font-size:13px;" data-i18n="copy_hint"></p>
  </div>

  <div class="footer">
    Made by Lisa (Lizziie) &amp; Felix 💜<br>
    <span style="display:inline-block; margin-top:8px;">
      <a id="ds-link" href="https://lizziies.github.io/downloader3-landing/datenschutz.html" style="color:var(--muted);" data-i18n="privacy_link">Datenschutz</a>
    </span>
  </div>
</div>

<!-- 🎨 Schwebender Farbwähler — eigene Akzentfarbe statt fest verdrahtetem Pink -->
<button class="color-fab" id="color-fab" title="Farbe anpassen" aria-label="Farbe anpassen">🎨</button>
<div class="color-panel" id="color-panel">
  <div class="color-panel-title" data-i18n="color_title">Akzentfarbe</div>
  <div class="swatch-row" id="swatch-row"></div>
  <div class="color-custom-row">
    <input type="color" id="color-custom" value="#EC4899">
    <button class="color-reset" id="color-reset" data-i18n="color_reset">Zurücksetzen</button>
  </div>
</div>

<script>
  // ⚠️ Hier die URL deines gehosteten Backend-Servers eintragen
  const BACKEND_URL = "https://downloader3-backend.onrender.com";
  // ⚠️ Hier deine echte PayPal Client-ID eintragen (aus developer.paypal.com)
  const PAYPAL_CLIENT_ID = "AQl4lrJDm8_E7wfH7iNGp19q--LGH6QWIb7kJZJ1YeOzLDR3GTI_FoIY_xhDvo5278iqflYjqqn91OF6";

  const I18N = {
    de: {
      sub: "Wähle dein Premium-Paket — Bezahlung sicher über PayPal",
      select_hint: "Klicke auf ein Angebot, um es auszuwählen — der Kauf-Button erscheint direkt darunter.",
      success_title: "🎉 Zahlung erfolgreich!",
      success_desc: "Gib diesen Code in der App unter <b>Premium → Code einlösen</b> ein:",
      copy_hint: "Tipp: Code anklicken markiert ihn automatisch zum Kopieren.",
      once: "einmalig",
      error_prefix: "⚠ ",
      payment_failed: "Zahlung fehlgeschlagen.",
      paypal_problem: "Es gab ein Problem mit PayPal. Bitte erneut versuchen.",
      email_label: "Deine E-Mail-Adresse (dieselbe wie in der App)",
      email_ph: "name@beispiel.de",
      email_hint: "Dein Premium wird an diese E-Mail gebunden — bleibt so erhalten, auch wenn du die App auf einem neuen Gerät neu installierst.",
      email_required: "Bitte zuerst deine E-Mail-Adresse eintragen.",
      prepay_warning: "⚠ <b>Bevor du bezahlst:</b> Du brauchst die Downloader&lt;3-App bereits installiert und ein Konto mit GENAU DIESER E-Mail-Adresse registriert. Ohne passendes Konto kannst du den Code nach der Zahlung nicht einlösen und bekommst kein Premium. Zahlung passiert hier auf der Webseite — eingelöst wird der Code danach in der App.",
      color_title: "Akzentfarbe",
      color_reset: "Zurücksetzen",
      privacy_link: "Datenschutz",
    },
    en: {
      sub: "Choose your Premium plan — securely paid via PayPal",
      select_hint: "Click a plan to select it — the buy button appears right below it.",
      success_title: "🎉 Payment successful!",
      success_desc: "Enter this code in the app under <b>Premium → Redeem code</b>:",
      copy_hint: "Tip: clicking the code selects it for easy copying.",
      once: "one-time",
      error_prefix: "⚠ ",
      payment_failed: "Payment failed.",
      paypal_problem: "There was a problem with PayPal. Please try again.",
      email_label: "Your email address (same as in the app)",
      email_ph: "name@example.com",
      email_hint: "Your Premium gets tied to this email — stays yours even if you reinstall the app on a new device.",
      email_required: "Please enter your email address first.",
      prepay_warning: "⚠ <b>Before you pay:</b> You need the Downloader&lt;3 app already installed with an account registered using THIS EXACT email address. Without a matching account, you won't be able to redeem the code after payment and won't receive Premium. Payment happens here on the website — the code is redeemed afterward inside the app.",
      color_title: "Accent color",
      color_reset: "Reset",
      privacy_link: "Privacy policy",
    },
  };

  const PLAN_META = {
    de: {
      "free":    { title: "Gratis",   popular: false, perks: ["YouTube-Links als MP4", "480p & 720p Auflösung", "Favoriten & Verlauf", "Individuelles Design"] },
      "30days":  { title: "30 Tage",  popular: false, perks: ["Alle Formate freigeschaltet", "1080p – 4K Auflösung", "KI-Modus & Web-Browser"] },
      "365days": { title: "1 Jahr",   popular: true,  perks: ["Alles aus 30 Tage", "Bestes Preis-Leistungs-Verhältnis", "Ein Jahr sorgenfrei"] },
      "forever": { title: "Für immer", popular: false, perks: ["Einmal zahlen, für immer nutzen", "Alle zukünftigen Updates", "Kein Ablaufdatum"] },
    },
    en: {
      "free":    { title: "Free",     popular: false, perks: ["YouTube links as MP4", "480p & 720p resolution", "Favorites & history", "Custom design"] },
      "30days":  { title: "30 days",  popular: false, perks: ["All formats unlocked", "1080p – 4K resolution", "AI mode & web browser"] },
      "365days": { title: "1 year",   popular: true,  perks: ["Everything from 30 days", "Best value for money", "A worry-free year"] },
      "forever": { title: "Forever",  popular: false, perks: ["Pay once, use forever", "All future updates", "No expiration date"] },
    },
  };

  let lang = localStorage.getItem("dl3_lang") || (navigator.language.startsWith("de") ? "de" : "en");
  let plansCache = null;
  let renderedKeys = [];

  function t(key) { return I18N[lang][key]; }

  function setLang(newLang) {
    lang = newLang;
    localStorage.setItem("dl3_lang", lang);
    // 🌍 Auch den Sprach-Speicher der Landingpage mitschreiben, damit die
    // Datenschutzseite (und die Landingpage) direkt in derselben Sprache
    // öffnen, wenn man von hier aus rüberklickt.
    localStorage.setItem("dl3_landing_lang", lang);
    // Zusätzlich die Sprache direkt an den Datenschutz-Link anhängen —
    // funktioniert dann sogar, wenn die Seiten mal auf verschiedenen
    // Domains liegen sollten (localStorage ist pro Domain getrennt).
    const dsLink = document.getElementById("ds-link");
    if (dsLink) {
      dsLink.href = "https://lizziies.github.io/downloader3-landing/datenschutz.html?lang=" + lang;
    }
    document.documentElement.lang = lang;
    document.getElementById("btn-de").classList.toggle("active", lang === "de");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
    document.querySelectorAll("[data-i18n]").forEach(el => {
      el.innerHTML = t(el.getAttribute("data-i18n"));
    });
    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
      el.placeholder = t(el.getAttribute("data-i18n-ph"));
    });

    const locale = lang === "de" ? "de_DE" : "en_US";
    if (locale !== paypalLocale) {
      paypalLocale = locale;
      loadPayPalSDK(locale, () => {
        if (plansCache) { renderPlans(plansCache); } else { loadPlans(); }
      });
    } else if (plansCache) {
      renderPlans(plansCache);
    }
  }

  async function loadPlans(attempt = 1) {
    const maxAttempts = 12; // ca. 60 Sekunden Gesamtwartezeit
    if (attempt === 1) {
      showLoadingState(tLoad("loading_server"));
    }
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(`${BACKEND_URL}/api/plans`,
        { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      plansCache = await res.json();
      hideLoadingState();
      renderPlans(plansCache);
    } catch (err) {
      if (attempt < maxAttempts) {
        showLoadingState(tLoad("waking_server") + ` (${attempt}/${maxAttempts})`);
        setTimeout(() => loadPlans(attempt + 1), 5000);
      } else {
        showLoadingState(tLoad("server_unreachable"), true);
      }
    }
  }

  function showLoadingState(msg, isError = false) {
    const container = document.getElementById("plans");
    container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:${isError ? '#F87171' : 'var(--muted)'};padding:30px;">${msg}</div>`;
  }

  function hideLoadingState() {
    // wird von renderPlans() ohnehin überschrieben
  }

  function tLoad(key) {
    const dict = {
      loading_server: lang === "de" ? "🔄 Lade Angebote..." : "🔄 Loading plans...",
      waking_server: lang === "de" ? "⏳ Server wacht gerade auf, das kann beim ersten Mal etwas dauern..." : "⏳ Server is waking up, this can take a bit the first time...",
      server_unreachable: lang === "de" ? "⚠ Server nicht erreichbar. Bitte Seite neu laden oder später erneut versuchen." : "⚠ Server unreachable. Please reload the page or try again later.",
    };
    return dict[key] || key;
  }

  function renderPlans(plans) {
    const container = document.getElementById("plans");
    container.innerHTML = "";
    renderedKeys = [];
    let firstPopularKey = null;

    // 🆓 Gratis-Karte zuerst — kostet nichts, also ganz ohne Zahlung:
    // einfach die App herunterladen und loslegen.
    {
      const meta = PLAN_META[lang]["free"];
      const div = document.createElement("div");
      div.className = "plan";
      div.dataset.plan = "free";
      div.innerHTML = `
        <h3>${meta.title}</h3>
        <div class="price">0 € <span>${lang === "de" ? "für immer" : "forever"}</span></div>
        <ul class="perks">${meta.perks.map(p => `<li>${p}</li>`).join("")}</ul>
        <a href="https://lizziies.github.io/downloader3-landing/#download"
           style="display:inline-block; padding:11px 22px; border-radius:999px;
                  border:1px solid var(--pink); color:var(--pink);
                  text-decoration:none; font-weight:700; font-size:14px;">
          ${lang === "de" ? "⬇ Einfach App laden — keine Zahlung nötig"
                          : "⬇ Just get the app — no payment needed"}</a>
      `;
      div.addEventListener("click", () => selectPlan("free"));
      container.appendChild(div);
      renderedKeys.push("free");
    }

    for (const [key, plan] of Object.entries(plans)) {
      const meta = (PLAN_META[lang] && PLAN_META[lang][key]) || { title: key, popular: false, perks: [] };
      if (meta.popular && !firstPopularKey) firstPopularKey = key;
      const div = document.createElement("div");
      div.className = "plan" + (meta.popular ? " popular" : "");
      div.dataset.plan = key;
      div.innerHTML = `
        ${meta.popular ? `<div class="badge">${lang === "de" ? "Beliebt" : "Popular"}</div>` : ""}
        <h3>${meta.title}</h3>
        <div class="price">${plan.price} € <span>${key === "forever" ? t("once") : ""}</span></div>
        <ul class="perks">${meta.perks.map(p => `<li>${p}</li>`).join("")}</ul>
        <div class="paypal-slot" id="paypal-container-${key}"></div>
      `;
      // 🖱️ Auf die Karte klicken → pinker Rahmen wandert zu diesem Angebot.
      // Ein Klick auf den eingebetteten PayPal-Button bubbelt zwar auch bis
      // hierhin durch, wählt dann aber einfach dieselbe (schon aktive)
      // Karte nochmal aus — harmlos, kein doppelter Effekt.
      div.addEventListener("click", () => selectPlan(key));
      container.appendChild(div);
      renderedKeys.push(key);
      try {
        renderPayPalButton(key);
      } catch (e) {
        console.error("PayPal-Button konnte für " + key + " nicht geladen werden:", e);
      }
    }
    // 🔄 Plan-Vorauswahl-Sync: Was auf der Landingpage angeklickt wurde
    // (?plan=... in der URL oder gemeinsamer Browser-Speicher), ist hier
    // automatisch vorausgewählt. Sonst: das "Beliebt"-Angebot.
    const urlPlan = new URLSearchParams(location.search).get("plan");
    const storedPlan = localStorage.getItem("dl3_selected_plan");
    const pre = [urlPlan, storedPlan, firstPopularKey, renderedKeys[0]]
      .find(k => k && renderedKeys.includes(k));
    selectPlan(pre);
    initReveal();
  }

  function selectPlan(key) {
    if (!key) return;
    document.querySelectorAll(".plan").forEach(el => {
      el.classList.toggle("selected", el.dataset.plan === key);
      el.style.transform = "";  // evtl. Tilt-Rest entfernen
    });
    // Auswahl auch für die Landingpage merken (gemeinsamer Speicher)
    localStorage.setItem("dl3_selected_plan", key);
  }

  function renderPayPalButton(planKey) {
    paypal.Buttons({
      style: { color: "gold", shape: "pill", label: "paypal", height: 45 },
      createOrder: async () => {
        const email = document.getElementById("buyer-email").value.trim();
        if (!email || !email.includes("@")) {
          showError(t("email_required"));
          throw new Error("email required");
        }
        const res = await fetch(`${BACKEND_URL}/api/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ plan: planKey }),
        });
        const data = await res.json();
        if (data.error) { showError(data.error); throw new Error(data.error); }
        return data.id;
      },
      onApprove: async (data) => {
        const email = document.getElementById("buyer-email").value.trim();
        const res = await fetch(`${BACKEND_URL}/api/capture-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderID: data.orderID, plan: planKey, email }),
        });
        const result = await res.json();
        if (!result.ok) { showError(result.error || t("payment_failed")); return; }
        showResult(result.code);
      },
      onError: () => showError(t("paypal_problem")),
    }).render(`#paypal-container-${planKey}`);
  }

  function showResult(code) {
    document.getElementById("code-box").textContent = code;
    const result = document.getElementById("result");
    result.classList.add("show");
    result.classList.add("reveal");
    requestAnimationFrame(() => result.classList.add("in"));
    result.scrollIntoView({ behavior: "smooth" });
  }

  function showError(msg) {
    const e = document.getElementById("error");
    e.textContent = t("error_prefix") + msg;
    e.classList.add("show");
  }

  let paypalLocale = null;
  let sdkGeneration = 0;

  function loadPayPalSDK(locale, onReady) {
    const myGen = ++sdkGeneration;
    const old = document.getElementById("paypal-sdk");
    if (old) old.remove();
    const s = document.createElement("script");
    s.id = "paypal-sdk";
    s.src = `https://www.paypal.com/sdk/js?client-id=${PAYPAL_CLIENT_ID}&currency=EUR&locale=${locale}`;
    s.onload = () => {
      // Veraltete Antwort ignorieren, falls inzwischen erneut umgeschaltet wurde
      if (myGen !== sdkGeneration) return;
      onReady();
    };
    document.head.appendChild(s);
  }

  // ---------- Scroll-Reveal ----------
  let revealObserver = null;
  function initReveal() {
    if (!revealObserver) {
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("in");
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -30px 0px" });
    }
    document.querySelectorAll(".reveal:not(.in)").forEach((el, i) => {
      el.style.transitionDelay = (i % 6) * 0.06 + "s";
      revealObserver.observe(el);
    });
  }
  initReveal();

  // ---------- 🎨 Custom-Farbwähler ----------
  const PRESETS = ["#EC4899", "#8B5CF6", "#3B82F6", "#10B981", "#F59E0B", "#EF4444", "#06B6D4"];

  function hexToRgb(hex) {
    const m = hex.replace("#", "");
    return {
      r: parseInt(m.substring(0, 2), 16),
      g: parseInt(m.substring(2, 4), 16),
      b: parseInt(m.substring(4, 6), 16),
    };
  }
  function darken(hex, amt) {
    const { r, g, b } = hexToRgb(hex);
    const f = (v) => Math.max(0, Math.round(v * (1 - amt)));
    return "#" + [f(r), f(g), f(b)].map(v => v.toString(16).padStart(2, "0")).join("");
  }
  function rgba(hex, a) {
    const { r, g, b } = hexToRgb(hex);
    return `rgba(${r}, ${g}, ${b}, ${a})`;
  }

  function applyAccent(hex, save) {
    const root = document.documentElement.style;
    root.setProperty("--pink", hex);
    root.setProperty("--pink-dark", darken(hex, 0.28));
    root.setProperty("--pink-glow", rgba(hex, 0.35));
    root.setProperty("--pink-glow2", rgba(hex, 0.14));
    document.querySelectorAll(".swatch").forEach(s => {
      s.classList.toggle("active", s.dataset.hex.toLowerCase() === hex.toLowerCase());
    });
    document.getElementById("color-custom").value = hex;
    if (save) {
      localStorage.setItem("dl3_landing_accent", JSON.stringify({
        base: hex, dark: darken(hex, 0.28), glow: rgba(hex, 0.35), glow2: rgba(hex, 0.14),
      }));
    }
  }

  function buildSwatches() {
    const row = document.getElementById("swatch-row");
    row.innerHTML = PRESETS.map(hex =>
      `<span class="swatch" data-hex="${hex}" style="background:${hex}"></span>`
    ).join("");
    row.querySelectorAll(".swatch").forEach(sw => {
      sw.addEventListener("click", () => applyAccent(sw.dataset.hex, true));
    });
  }
  buildSwatches();

  (function syncSavedAccent() {
    try {
      const raw = localStorage.getItem("dl3_landing_accent");
      if (raw) {
        const c = JSON.parse(raw);
        document.querySelectorAll(".swatch").forEach(s => {
          s.classList.toggle("active", s.dataset.hex.toLowerCase() === c.base.toLowerCase());
        });
        document.getElementById("color-custom").value = c.base;
      } else {
        document.querySelector('.swatch[data-hex="#EC4899"]').classList.add("active");
      }
    } catch (e) {}
  })();

  document.getElementById("color-custom").addEventListener("input", (e) => {
    applyAccent(e.target.value, true);
  });
  document.getElementById("color-reset").addEventListener("click", () => {
    localStorage.removeItem("dl3_landing_accent");
    applyAccent("#EC4899", false);
  });

  const fab = document.getElementById("color-fab");
  const panel = document.getElementById("color-panel");
  fab.addEventListener("click", (e) => {
    e.stopPropagation();
    panel.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!panel.contains(e.target) && e.target !== fab) panel.classList.remove("open");
  });

  // ---------- 💥 Herzchen-Burst bei jedem Klick — in der GEWÄHLTEN Akzentfarbe ----------
  function currentAccent() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue("--pink").trim() || "#EC4899";
  }
  function lighten(hex, amt) {
    const { r, g, b } = hexToRgb(hex);
    const f = (v) => Math.min(255, Math.round(v + (255 - v) * amt));
    return "#" + [f(r), f(g), f(b)].map(v => v.toString(16).padStart(2, "0")).join("");
  }
  function spawnHearts(x, y, count) {
    const base = currentAccent();
    const tones = [base, lighten(base, 0.35), darken(base, 0.25)];
    for (let i = 0; i < count; i++) {
      const s = document.createElement("span");
      s.className = "burst-heart";
      const size = 10 + Math.random() * 9;
      const fill = tones[Math.floor(Math.random() * tones.length)];
      s.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
        <path fill="${fill}" d="M16 29S3 20.65 3 12a7.5 7.5 0 0 1 13-5.13A7.5 7.5 0 0 1 29 12c0 8.65-13 17-13 17z"/></svg>`;
      const ang = (Math.PI * 2 * i) / count + Math.random() * 0.8;
      const dist = 34 + Math.random() * 42;
      s.style.left = x + "px";
      s.style.top = y + "px";
      s.style.setProperty("--bx", Math.cos(ang) * dist + "px");
      s.style.setProperty("--by", Math.sin(ang) * dist - 26 + "px");
      s.style.setProperty("--br", (Math.random() * 90 - 45) + "deg");
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 850);
    }
  }
  document.addEventListener("click", (e) => {
    // Nicht in Eingabefeldern/Farbwähler feuern (der PayPal-Button selbst
    // ist ein iframe — Klicks darin erreichen diese Seite ohnehin nicht).
    if (e.target.closest("input, select, textarea, .color-panel")) return;
    spawnHearts(e.clientX, e.clientY, 6);
  });

  // ---------- 🔦 Weicher Leucht-Cursor (sanft nachziehend) ----------
  (function cursorGlow() {
    if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const glow = document.getElementById("cursor-glow");
    let tx = -999, ty = -999, cx = -999, cy = -999, active = false;
    document.addEventListener("mousemove", (e) => {
      tx = e.clientX; ty = e.clientY;
      if (!active) { active = true; cx = tx; cy = ty; loop(); }
    }, { passive: true });
    function loop() {
      cx += (tx - cx) * 0.12;
      cy += (ty - cy) * 0.12;
      glow.style.left = cx + "px";
      glow.style.top = cy + "px";
      requestAnimationFrame(loop);
    }
  })();

  // ---------- 🎢 3D-Tilt auf den Angebots-Karten (außer der ausgewählten) ----------
  const plansEl = document.getElementById("plans");
  plansEl.addEventListener("mousemove", (e) => {
    const card = e.target.closest(".plan");
    if (!card || card.classList.contains("selected")) return;
    const r = card.getBoundingClientRect();
    const rx = (((e.clientY - r.top) / r.height) - 0.5) * -6;
    const ry = (((e.clientX - r.left) / r.width) - 0.5) * 8;
    card.style.transform = `translateY(-5px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  });
  plansEl.addEventListener("mouseout", (e) => {
    const card = e.target.closest(".plan");
    if (!card || card.contains(e.relatedTarget)) return;
    card.style.transform = "";
  });

  setLang(lang);
</script>
</body>
</html>
